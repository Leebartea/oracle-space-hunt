name: Oracle Space Hunt

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Run target profile"
        required: true
        default: primary
        type: choice
        options:
          - primary
          - fallback
  schedule:
    - cron: "7,22,37,52 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: oracle-space-hunt
  cancel-in-progress: false

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Precheck prior secured state
        id: precheck
        shell: bash
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import urllib.request
          from pathlib import Path

          repo = os.environ["GITHUB_REPOSITORY"]
          owner, name = repo.split("/", 1)
          status_url = f"https://{owner.lower()}.github.io/{name}/status.json"
          payload = {}
          try:
              with urllib.request.urlopen(status_url, timeout=20) as resp:
                  payload = json.load(resp)
          except Exception:
              payload = {}

          Path("previous_status.json").write_text(json.dumps(payload, indent=2) + "\n")
          outputs = Path(os.environ["GITHUB_OUTPUT"])
          secured = bool(payload.get("secured"))
          with outputs.open("a", encoding="utf-8") as fh:
              fh.write(f"secured={'true' if secured else 'false'}\n")
          PY

      - name: Set up Python
        if: steps.precheck.outputs.secured != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install OCI CLI
        if: steps.precheck.outputs.secured != 'true'
        run: python -m pip install --disable-pip-version-check oci-cli

      - name: Materialize OCI and hunt config
        if: steps.precheck.outputs.secured != 'true'
        shell: bash
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_API_KEY_PEM: ${{ secrets.OCI_API_KEY_PEM }}
          ORACLE_HUNT_CONFIG_JSON: ${{ secrets.ORACLE_HUNT_CONFIG_JSON }}
          RUN_PROFILE: ${{ github.event.inputs.profile || 'primary' }}
        run: |
          set -euo pipefail
          mkdir -p ~/.oci ~/.ssh
          printf '%s\n' "$OCI_API_KEY_PEM" > ~/.oci/oracle_retry_api_key.pem
          chmod 600 ~/.oci/oracle_retry_api_key.pem

          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=${OCI_USER_OCID}
          fingerprint=${OCI_FINGERPRINT}
          key_file=/home/runner/.oci/oracle_retry_api_key.pem
          tenancy=${OCI_TENANCY_OCID}
          region=${OCI_REGION}
          EOF
          chmod 600 ~/.oci/config

          printf '%s\n' "$ORACLE_HUNT_CONFIG_JSON" > oracle_space_hunt.local.json

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          config_path = Path("oracle_space_hunt.local.json")
          config = json.loads(config_path.read_text())
          metadata = config.setdefault("launch", {}).setdefault("metadata", {})
          ssh_public_key = metadata.pop("github_runner_ssh_public_key", "").strip()
          if not ssh_public_key:
              raise SystemExit("Missing launch.metadata.github_runner_ssh_public_key in ORACLE_HUNT_CONFIG_JSON")

          ssh_path = Path("/home/runner/.ssh/oracle_bot_key.pub")
          ssh_path.write_text(ssh_public_key + "\n")

          config["launch"]["ssh_authorized_keys_file"] = str(ssh_path)
          config.setdefault("artifacts", {})
          config["artifacts"].pop("runtime_root", None)
          config["artifacts"]["log_file"] = str(Path.cwd() / "oracle_retry.log")
          config["artifacts"]["state_file"] = str(Path.cwd() / "oracle_retry_state.json")
          config["artifacts"]["lock_file"] = str(Path.cwd() / "oracle_retry.lock")

          selected_profile = os.environ.get("RUN_PROFILE", "primary").strip().lower()
          retry_cfg = config.setdefault("retry", {})
          fallback = retry_cfg.get("fallback") or {}
          fallback_ocpus = fallback.get("ocpus") or fallback.get("fallback_ocpus") or 1
          fallback_memory = fallback.get("memory_in_gbs") or fallback.get("fallback_memory_in_gbs") or 6
          retry_cfg["fallback"] = {
              "enabled": bool(fallback.get("enabled")),
              "ocpus": fallback_ocpus,
              "memory_in_gbs": fallback_memory,
          }
          if selected_profile == "fallback":
              config["launch"]["ocpus"] = fallback_ocpus
              config["launch"]["memory_in_gbs"] = fallback_memory
              retry_cfg["fallback"] = {
                  "enabled": False,
                  "ocpus": fallback_ocpus,
                  "memory_in_gbs": fallback_memory,
              }
              config.setdefault("launch", {}).setdefault("metadata", {})["selected_profile"] = "fallback"
          else:
              config.setdefault("launch", {}).setdefault("metadata", {})["selected_profile"] = "primary"
          config_path.write_text(json.dumps(config, indent=2) + "\n")
          PY

      - name: Run one Oracle hunt attempt
        id: hunt
        if: steps.precheck.outputs.secured != 'true'
        shell: bash
        run: |
          set +e
          python oracle_free_tier_retry_launch.py --config oracle_space_hunt.local.json --once 2>&1 | tee oracle_retry.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" -eq 0 ]; then
            echo "status=secured_or_already_exists" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$code" -eq 5 ]; then
            echo "status=capacity_unavailable" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "status=hard_failure" >> "$GITHUB_OUTPUT"
          exit "$code"

      - name: Upload retry artifacts
        if: always() && steps.precheck.outputs.secured != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: oracle-space-hunt-${{ github.run_id }}
          path: |
            oracle_retry.log
            oracle_retry_state.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Write workflow summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Oracle Space Hunt"
            echo
            if [ "${{ steps.precheck.outputs.secured || 'false' }}" = "true" ]; then
              echo "- Result: \`skipped_after_success\`"
              echo "- Exit code: \`n/a\`"
              echo "- Note: Capacity was already secured previously, so this scheduled run exited early."
            else
              echo "- Result: \`${{ steps.hunt.outputs.status || 'unknown' }}\`"
              echo "- Exit code: \`${{ steps.hunt.outputs.exit_code || 'n/a' }}\`"
            fi
            echo "- Schedule: \`7,22,37,52 * * * *\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build hosted dashboard payload
        if: always()
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PRECHECK_SECURED: ${{ steps.precheck.outputs.secured || 'false' }}
          HUNT_STATUS: ${{ steps.hunt.outputs.status || 'unknown' }}
          HUNT_EXIT_CODE: ${{ steps.hunt.outputs.exit_code || 'n/a' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail
          mkdir -p site
          cp docs/index.html site/index.html

          python - <<'PY'
          import json
          import os
          from datetime import datetime, UTC
          from pathlib import Path

          def to_utc_iso(value):
              if not value:
                  return None
              text = str(value).strip()
              try:
                  dt = datetime.strptime(text, "%Y-%m-%d %H:%M:%S").replace(tzinfo=UTC)
                  return dt.isoformat().replace("+00:00", "Z")
              except ValueError:
                  return text

          def fetch_recent_runs(repo, token, limit=8):
              import urllib.request
              import urllib.parse

              if not token:
                  return []
              base = f"https://api.github.com/repos/{repo}/actions/workflows/oracle-space-hunt.yml/runs"
              query = urllib.parse.urlencode({"per_page": limit})
              req = urllib.request.Request(
                  f"{base}?{query}",
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "User-Agent": "oracle-space-hunt",
                  },
              )
              try:
                  with urllib.request.urlopen(req, timeout=20) as resp:
                      payload = json.load(resp)
              except Exception:
                  return []
              runs = []
              for item in payload.get("workflow_runs", []):
                  runs.append(
                      {
                          "id": item.get("id"),
                          "event": item.get("event"),
                          "status": item.get("status"),
                          "conclusion": item.get("conclusion"),
                          "run_number": item.get("run_number"),
                          "created_at": item.get("created_at"),
                          "updated_at": item.get("updated_at"),
                          "html_url": item.get("html_url"),
                      }
                  )
              return runs

          config_file = Path("oracle_space_hunt.local.json")
          config = json.loads(config_file.read_text()) if config_file.exists() else {}
          state_path = Path("oracle_retry_state.json")
          state = json.loads(state_path.read_text()) if state_path.exists() else {}
          previous_path = Path("previous_status.json")
          previous = json.loads(previous_path.read_text()) if previous_path.exists() else {}
          secured_previously = os.environ.get("PRECHECK_SECURED", "false").lower() == "true"
          recent_runs = fetch_recent_runs(os.environ["GITHUB_REPOSITORY"], os.environ.get("GITHUB_TOKEN", ""))

          if secured_previously:
              preserved_attempts = previous.get("attempt_count")
              payload = {
                  **previous,
                  "repo": os.environ["GITHUB_REPOSITORY"],
                  "repo_url": f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}",
                  "workflow_url": f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/workflows/oracle-space-hunt.yml",
                  "run_url": f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
                  "attempt_count": int(preserved_attempts) if preserved_attempts is not None else int(os.environ["GITHUB_RUN_NUMBER"]),
                  "selected_profile": previous.get("selected_profile", "primary"),
                  "guarded_after_success": True,
                  "last_result": previous.get("last_result", "secured_or_already_exists"),
                  "last_message": "Capacity was already secured previously, so this scheduled run exited early without checking Oracle again.",
                  "last_exit_code": previous.get("last_exit_code", 0),
                  "schedule_minutes": [7, 22, 37, 52],
                  "schedule_note": "Capacity was already secured previously, so scheduled GitHub runs now exit early before checking Oracle again. The hunter targets minute :07, :22, :37 and :52 of every hour, but GitHub scheduled workflows are still best-effort, so the wake-up itself may drift.",
                  "log_tail": (previous.get("log_tail") or [])[-15:] + ["[oracle-retry] Capacity already secured previously; skipped new Oracle check on this run."],
                  "recent_runs": recent_runs or previous.get("recent_runs") or [],
                  "secured": True,
              }
          else:
              payload = {
                  "repo": os.environ["GITHUB_REPOSITORY"],
                  "repo_url": f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}",
                  "workflow_url": f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/workflows/oracle-space-hunt.yml",
                  "run_url": f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
                  "attempt_count": int(os.environ["GITHUB_RUN_NUMBER"]),
                  "selected_profile": (config.get("launch") or {}).get("metadata", {}).get("selected_profile", "primary"),
                  "guarded_after_success": False,
                  "last_result": state.get("last_result") or os.environ.get("HUNT_STATUS", "unknown"),
                  "last_message": state.get("last_message"),
                  "last_exit_code": state.get("last_exit_code") or os.environ.get("HUNT_EXIT_CODE"),
                  "last_capacity_status": state.get("last_capacity_status"),
                  "last_capacity_available_count": state.get("last_capacity_available_count"),
                  "last_fault_domain": state.get("last_fault_domain"),
                  "last_target_label": state.get("last_target_label", "primary"),
                  "last_target_ocpus": state.get("last_target_ocpus"),
                  "last_target_memory_in_gbs": state.get("last_target_memory_in_gbs"),
                  "last_started_at": to_utc_iso(state.get("last_started_at")),
                  "last_finished_at": to_utc_iso(state.get("last_finished_at")),
                  "last_success_at": to_utc_iso(state.get("last_success_at")),
                  "secured": bool(state.get("secured")),
                  "secured_instance_id": state.get("secured_instance_id"),
                  "secured_lifecycle": state.get("secured_lifecycle"),
                  "primary_ocpus": config["launch"].get("ocpus"),
                  "primary_memory_in_gbs": config["launch"].get("memory_in_gbs"),
                  "fallback_enabled": bool((config.get("retry") or {}).get("fallback", {}).get("enabled")),
                  "fallback_ocpus": (config.get("retry") or {}).get("fallback", {}).get("ocpus") or 1,
                  "fallback_memory_in_gbs": (config.get("retry") or {}).get("fallback", {}).get("memory_in_gbs") or 6,
                  "schedule_minutes": [7, 22, 37, 52],
                  "schedule_note": "GitHub-hosted hunter targets minute :07, :22, :37 and :52 of every hour. GitHub scheduled workflows are best-effort, so runs can be delayed a few minutes or occasionally dropped. The next run shown here is the next expected slot, not a guarantee. The dashboard is monitor-only, but the workflow page can trigger a one-off fallback run.",
                  "log_tail": Path("oracle_retry.log").read_text().splitlines()[-16:] if Path("oracle_retry.log").exists() else [],
                  "recent_runs": recent_runs,
              }
          Path("site/status.json").write_text(json.dumps(payload, indent=2) + "\n")
          PY

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: always()
    needs: hunt
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy dashboard
        id: deployment
        uses: actions/deploy-pages@v4
