name: Oracle Space Hunt

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Run target profile"
        required: true
        default: primary
        type: choice
        options:
          - primary
          - fallback
  schedule:
    - cron: "7,37 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: oracle-space-hunt
  cancel-in-progress: false

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install OCI CLI
        run: python -m pip install --disable-pip-version-check oci-cli

      - name: Materialize OCI and hunt config
        shell: bash
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_API_KEY_PEM: ${{ secrets.OCI_API_KEY_PEM }}
          ORACLE_HUNT_CONFIG_JSON: ${{ secrets.ORACLE_HUNT_CONFIG_JSON }}
          RUN_PROFILE: ${{ github.event.inputs.profile || 'primary' }}
        run: |
          set -euo pipefail
          mkdir -p ~/.oci ~/.ssh
          printf '%s\n' "$OCI_API_KEY_PEM" > ~/.oci/oracle_retry_api_key.pem
          chmod 600 ~/.oci/oracle_retry_api_key.pem

          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=${OCI_USER_OCID}
          fingerprint=${OCI_FINGERPRINT}
          key_file=/home/runner/.oci/oracle_retry_api_key.pem
          tenancy=${OCI_TENANCY_OCID}
          region=${OCI_REGION}
          EOF
          chmod 600 ~/.oci/config

          printf '%s\n' "$ORACLE_HUNT_CONFIG_JSON" > oracle_space_hunt.local.json

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          config_path = Path("oracle_space_hunt.local.json")
          config = json.loads(config_path.read_text())
          metadata = config.setdefault("launch", {}).setdefault("metadata", {})
          ssh_public_key = metadata.pop("github_runner_ssh_public_key", "").strip()
          if not ssh_public_key:
              raise SystemExit("Missing launch.metadata.github_runner_ssh_public_key in ORACLE_HUNT_CONFIG_JSON")

          ssh_path = Path("/home/runner/.ssh/oracle_bot_key.pub")
          ssh_path.write_text(ssh_public_key + "\n")

          config["launch"]["ssh_authorized_keys_file"] = str(ssh_path)
          config.setdefault("artifacts", {})
          config["artifacts"].pop("runtime_root", None)
          config["artifacts"]["log_file"] = str(Path.cwd() / "oracle_retry.log")
          config["artifacts"]["state_file"] = str(Path.cwd() / "oracle_retry_state.json")
          config["artifacts"]["lock_file"] = str(Path.cwd() / "oracle_retry.lock")

          selected_profile = os.environ.get("RUN_PROFILE", "primary").strip().lower()
          retry_cfg = config.setdefault("retry", {})
          fallback = retry_cfg.get("fallback") or {}
          fallback_ocpus = fallback.get("ocpus") or fallback.get("fallback_ocpus") or 1
          fallback_memory = fallback.get("memory_in_gbs") or fallback.get("fallback_memory_in_gbs") or 6
          retry_cfg["fallback"] = {
              "enabled": bool(fallback.get("enabled")),
              "ocpus": fallback_ocpus,
              "memory_in_gbs": fallback_memory,
          }
          if selected_profile == "fallback":
              config["launch"]["ocpus"] = fallback_ocpus
              config["launch"]["memory_in_gbs"] = fallback_memory
              retry_cfg["fallback"] = {
                  "enabled": False,
                  "ocpus": fallback_ocpus,
                  "memory_in_gbs": fallback_memory,
              }
              config.setdefault("launch", {}).setdefault("metadata", {})["selected_profile"] = "fallback"
          else:
              config.setdefault("launch", {}).setdefault("metadata", {})["selected_profile"] = "primary"
          config_path.write_text(json.dumps(config, indent=2) + "\n")
          PY

      - name: Run one Oracle hunt attempt
        id: hunt
        shell: bash
        run: |
          set +e
          python oracle_free_tier_retry_launch.py --config oracle_space_hunt.local.json --once 2>&1 | tee oracle_retry.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" -eq 0 ]; then
            echo "status=secured_or_already_exists" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$code" -eq 5 ]; then
            echo "status=capacity_unavailable" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "status=hard_failure" >> "$GITHUB_OUTPUT"
          exit "$code"

      - name: Upload retry artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oracle-space-hunt-${{ github.run_id }}
          path: |
            oracle_retry.log
            oracle_retry_state.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Write workflow summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Oracle Space Hunt"
            echo
            echo "- Result: \`${{ steps.hunt.outputs.status || 'unknown' }}\`"
            echo "- Exit code: \`${{ steps.hunt.outputs.exit_code || 'n/a' }}\`"
            echo "- Schedule: \`7,37 * * * *\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build hosted dashboard payload
        if: always()
        shell: bash
        env:
          HUNT_STATUS: ${{ steps.hunt.outputs.status || 'unknown' }}
          HUNT_EXIT_CODE: ${{ steps.hunt.outputs.exit_code || 'n/a' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail
          mkdir -p site
          cp docs/index.html site/index.html

          python - <<'PY'
          import json
          import os
          from datetime import datetime, UTC
          from pathlib import Path

          def to_utc_iso(value):
              if not value:
                  return None
              text = str(value).strip()
              try:
                  dt = datetime.strptime(text, "%Y-%m-%d %H:%M:%S").replace(tzinfo=UTC)
                  return dt.isoformat().replace("+00:00", "Z")
              except ValueError:
                  return text

          config = json.loads(Path("oracle_space_hunt.local.json").read_text())
          state_path = Path("oracle_retry_state.json")
          state = json.loads(state_path.read_text()) if state_path.exists() else {}
          payload = {
              "repo": os.environ["GITHUB_REPOSITORY"],
              "repo_url": f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}",
              "workflow_url": f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/workflows/oracle-space-hunt.yml",
              "run_url": f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
              "attempt_count": int(os.environ["GITHUB_RUN_NUMBER"]),
              "selected_profile": (config.get("launch") or {}).get("metadata", {}).get("selected_profile", "primary"),
              "last_result": state.get("last_result") or os.environ.get("HUNT_STATUS", "unknown"),
              "last_message": state.get("last_message"),
              "last_exit_code": state.get("last_exit_code") or os.environ.get("HUNT_EXIT_CODE"),
              "last_capacity_status": state.get("last_capacity_status"),
              "last_capacity_available_count": state.get("last_capacity_available_count"),
              "last_fault_domain": state.get("last_fault_domain"),
              "last_target_label": state.get("last_target_label", "primary"),
              "last_target_ocpus": state.get("last_target_ocpus"),
              "last_target_memory_in_gbs": state.get("last_target_memory_in_gbs"),
              "last_started_at": to_utc_iso(state.get("last_started_at")),
              "last_finished_at": to_utc_iso(state.get("last_finished_at")),
              "last_success_at": to_utc_iso(state.get("last_success_at")),
              "secured": bool(state.get("secured")),
              "secured_instance_id": state.get("secured_instance_id"),
              "secured_lifecycle": state.get("secured_lifecycle"),
              "primary_ocpus": config["launch"].get("ocpus"),
              "primary_memory_in_gbs": config["launch"].get("memory_in_gbs"),
              "fallback_enabled": bool((config.get("retry") or {}).get("fallback", {}).get("enabled")),
              "fallback_ocpus": (config.get("retry") or {}).get("fallback", {}).get("ocpus") or 1,
              "fallback_memory_in_gbs": (config.get("retry") or {}).get("fallback", {}).get("memory_in_gbs") or 6,
              "schedule_minutes": [7, 37],
              "schedule_note": "GitHub-hosted hunter schedule starts at minute 7 and 37 each hour. The next run is based on those fixed start times, not 30 minutes after the last run finishes. The dashboard is monitor-only, but the workflow page can trigger a one-off fallback run.",
              "log_tail": Path("oracle_retry.log").read_text().splitlines()[-16:] if Path("oracle_retry.log").exists() else [],
          }
          Path("site/status.json").write_text(json.dumps(payload, indent=2) + "\n")
          PY

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: always()
    needs: hunt
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy dashboard
        id: deployment
        uses: actions/deploy-pages@v4
